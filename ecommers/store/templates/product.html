{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
    <div class="card shadow-sm border-0 mx-auto" style="max-width: 900px;">
        <div class="row g-0 align-items-center">
            <div class="col-md-6 p-4 text-center">
                <img src="{{ product.image.url }}" class="img-fluid rounded" style="max-height: 450px;">
            </div>
            <div class="col-md-6 p-5">
                <h2 class="display-5 fw-bold">{{ product.name }}</h2>
                <p class="text-muted fs-5">Tabla de madera de alta calidad</p>
                <div class="mb-4">
                    {% if product.is_saler %}
                        <strike class="text-muted fs-5">${{ product.price|stringformat:".2f" }}</strike><br>
                        <span class="text-danger display-6 fw-bold">${{ product.sale_price|stringformat:".2f" }}</span>
                    {% else %}
                        <span class="display-6 fw-bold">${{ product.price|stringformat:".2f" }}</span>
                    {% endif %}
                </div>
                <div class="d-flex align-items-center mb-4">
                    <label class="me-3 fs-5">Cantidad:</label>
                    <select class="form-select w-25"><option>1</option><option>2</option></select>
                </div>
                <div class="d-grid gap-2 d-md-flex">
                    <a href="{% url 'home' %}" class="btn btn-secondary btn-lg">Inicio</a>
                    <button class="btn btn-dark btn-lg">Agregar al Carrito</button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
