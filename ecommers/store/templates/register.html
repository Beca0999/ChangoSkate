{% extends 'base.html' %}
{% block content %}
         <header class="bg-dark py-5">
            <div class="container px-4 px-lg-5 my-5">
                <div class="text-center text-white">

                    <h1 class="display-4 fw-bolder">
                        Registrate
                    </h1>
                    <p class="lead fw-normal text-white-50 mb-0">Crea una nueva cuenta para acceder a tus pedidos y preferencias.</p>
                </div>
            </div>
        </header>

        <div class="container">
            <div class="row">
                
                <div class="col-md-6 offset-md-3 mx-auto">
                    <br><br>
                    <form method="POST" action="{%url 'register'%}">
                        {% csrf_token %}

                        {{ form.as_p }}
                        <br><br>
                        <button type="submit" class="btn btn-secondary">Registrarse</button>
                    </form>
                    <br><br><br><br><br><br>
                </div>
            </div>
        </div>
{% endblock %}
