{% extends 'base.html' %}
{% block content %}
         <header class="bg-dark py-5">
            <div class="container px-4 px-lg-5 my-5">
                <div class="text-center text-white">

                    <h1 class="display-4 fw-bolder">
                        Login
                    </h1>
                    <p class="lead fw-normal text-white-50 mb-0">Inicia sesión en tu cuenta para acceder a tus pedidos y preferencias.</p>
                </div>
            </div>
        </header>

        <div class="container">
            <div class="row">
                
                <div class="col-lg- mx-auto">
                    <br><br>
                    <form method="POST" action="{%url 'login'%}">
                        {% csrf_token %}
                        <div class="mb-3">

                            <input type="text" class="form-control" name="username" placeholder="Ingresa tu nombre de usuario">

                        </div>

                        <div class="mb-3">
                            <input type="password" class="form-control" name="password" placeholder="Ingresa tu contraseña">
                        </div>

                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="exampleCheck1">
                            <label class="form-check-label" for="exampleCheck1">Check me out</label>
                        </div>
                        <button type="submit" class="btn btn-secondary">Iniciar sesión</button>
                    </form>
                    <br><br><br><br><br><br>
                </div>
            </div>
        </div>
{% endblock %}
